      const btn = document.getElementById('overheadBtn');
      if (btn) btn.classList.toggle('active', overheadMode);
    }

    // Hebt die globale Spiegelung lokal pro Textaufruf wieder auf, damit
    // die Glyphen lesbar bleiben. Links-/rechtsbündige Ausrichtung muss
    // dabei die Seite wechseln (betrifft die Planeten-Labels): Der Anker
    // spiegelt mit der Szene, also muss der Text vom Anker aus in die
    // jeweils andere Richtung laufen — sonst schriebe z. B. ein Label,
    // das rechts vom Planeten stand, nach der Spiegelung ÜBER den Planeten.
    // Zentrierter Text (Zifferblatt, Kompass, Zeit-Labels) ist unberührt.
    function withTextUnmirrored(drawFn) {
      const origFillText   = ctx.fillText.bind(ctx);
      const origStrokeText = ctx.strokeText.bind(ctx);
      const unmirror = (orig) => function(text, x, y, maxWidth) {
        ctx.save();
        ctx.translate(x, y);
        ctx.scale(-1, 1);
        if      (ctx.textAlign === 'left')  ctx.textAlign = 'right';
        else if (ctx.textAlign === 'right') ctx.textAlign = 'left';
        orig(text, 0, 0, maxWidth);
        ctx.restore();
      };
      ctx.fillText   = unmirror(origFillText);
      ctx.strokeText = unmirror(origStrokeText);
      try { drawFn(); } finally {
        ctx.fillText   = origFillText;
        ctx.strokeText = origStrokeText;
      }
    }

    function tick() {
      const now     = getVirtualNow();       // virtuelle Zeit (Zeitraffer-Feature)
      const local   = getLocalParts(now);    // Ortszeit des gewählten Standorts
      const sunData = getSunData(now, local);
      const lstDeg  = getLST(now, LON);

      // === Die eine Rotation — alle Himmelsobjekte teilen diesen Wert ===
      const sunClockAngle = (sunData.h / 24) * 2 * Math.PI;
      const rotation      = sunClockAngle - sunData.azimuthFromNorth;

      const moonData = getMoonData(now, rotation);
      const cx = size / 2, cy = size / 2;
      // Zwei Radien — der Kern der Layout-Änderung:
      // R_sky   = Himmelskuppel / Horizont (Sterne, Sonne, Mond leben hier)
      // R_outer = Äußerer Zifferblatt-Ring (Stunden-Marken und Zahlen leben hier)
      const R_sky   = (size / 2) * 0.81;
      const R_outer = (size / 2) * 0.94;

      // Kompass-Positionen früh berechnen — sie dienen auch den Planeten-
      // Labels und den Auf-/Untergangs-Labels als Kollisions-Referenz.
      const compassPositions = computeCompassLabelPositions(cx, cy, R_sky, rotation);

      ctx.clearRect(0, 0, size, size);

      // Über-Kopf-Modus: komplette Zeichnung horizontal spiegeln — nur die
      // Positionen; die Schrift bleibt via withTextUnmirrored lesbar.
      ctx.save();
      if (overheadMode) {
        ctx.translate(size, 0);
        ctx.scale(-1, 1);
      }

      const drawEverything = () => {
        drawSkyBackground(cx, cy, R_sky, sunData);                // 0. Naturalistischer Himmel

        updatePrecession(now);                                    // J2000 → aktuelle Epoche (gecacht)
        drawStarField(cx, cy, R_sky, rotation, lstDeg, sunData.altitudeDeg);          // 1. Sterne
        drawConstellations(cx, cy, R_sky, rotation, lstDeg, sunData.altitudeDeg);     // 2. Sternbild-Linien

        // 3. Planeten (über Sternen, unter Mond/Sonne)
        computePlanetPositions(now, lstDeg);
        drawPlanets(cx, cy, R_sky, rotation, sunData.altitudeDeg, compassPositions);

        // 4. Auf-/Untergangs-Zeit-Labels für Sonne und Mond, an der jeweils
        //    echten Himmelsrichtung — Position pendelt mit der aktuellen
        //    Rotation, genau wie der Kompass. Nahe Voll-/Neumond können
        //    Sonne und Mond (fast) am selben Azimut auf-/untergehen — der
        //    Punkt bleibt dann bewusst exakt gleich, aber die Texte werden
        //    bei Bedarf auseinandergeschoben (siehe resolveLabelCollisions).
        updateRiseSetIfNeeded(now, local);
        const sunColor  = 'rgba(255, 210, 130, 0.95)';
        const moonColor = 'rgba(200, 220, 245, 0.95)';
        const riseSetLabels = [];
        if (cachedSunRiseSet) {
          riseSetLabels.push({
            pos: computeRiseSetLabelPos(cx, cy, R_sky, cachedSunRiseSet.riseAz, rotation),
            text: '↑ ' + formatTime(cachedSunRiseSet.rise), color: sunColor
          });
          riseSetLabels.push({
            pos: computeRiseSetLabelPos(cx, cy, R_sky, cachedSunRiseSet.setAz, rotation),
            text: '↓ ' + formatTime(cachedSunRiseSet.set), color: sunColor
          });
        }
        if (cachedMoonRiseSet) {
          riseSetLabels.push({
            pos: computeRiseSetLabelPos(cx, cy, R_sky, cachedMoonRiseSet.riseAz, rotation),
            text: '↑ ' + formatTime(cachedMoonRiseSet.rise), color: moonColor
          });
          riseSetLabels.push({
            pos: computeRiseSetLabelPos(cx, cy, R_sky, cachedMoonRiseSet.setAz, rotation),
            text: '↓ ' + formatTime(cachedMoonRiseSet.set), color: moonColor
          });
        }
        const riseSetFontSize = Math.round(size * 0.020);  // identisch zu RISE_SET_FONT
        ctx.font = RISE_SET_FONT();
        for (const l of riseSetLabels) l.halfW = ctx.measureText(l.text).width / 2;
        const labelMinSeparation = Math.max(...riseSetLabels.map(l => l.halfW * 2), 0) + size * 0.015;

        // Mehrere Runden abwechselnd auflösen: Das Ausweichen vor dem Kompass
        // kann ein Label in den Weg eines anderen Zeit-Labels schieben (und
        // umgekehrt) — ein einzelner Durchlauf reichte dafür manchmal nicht.
        for (let round = 0; round < 3; round++) {
          resolveLabelCollisions(cx, cy, riseSetLabels, labelMinSeparation);
          resolveCompassCollisions(cx, cy, riseSetLabels, compassPositions, riseSetFontSize);
        }

        for (const l of riseSetLabels) drawRiseSetLabel(l.pos, l.text, l.color);

        drawDial(cx, cy, R_outer, R_sky);                        // 5. Zifferblatt (außen)
        drawCompass(compassPositions);                           // 6. N/E/S/W (innen)
        drawHorizonRing(cx, cy, R_sky, rotation);                // 7. Horizont-Ring (Azimut-Skala)
        drawSunHand(cx, cy, R_sky, sunData);                     // 8. Stundenzeiger
        drawMinuteHand(cx, cy, R_sky, local);                    // 9. Minutenzeiger
        drawSun(cx, cy, R_sky, sunData);                         // 10. Sonne
        drawMoon(cx, cy, R_sky, moonData, sunData);              // 11. Mond (über der Sonne —
                                                                 //     bei Neumond-Überdeckung steht
                                                                 //     der Mond VOR der Sonne, wie bei
                                                                 //     einer echten Sonnenfinsternis)
        drawCenter(cx, cy);                                      // 12. Mittelpunkt
      };

      if (overheadMode) {
        withTextUnmirrored(drawEverything);
      } else {
        drawEverything();
      }

      ctx.restore();

      syncDateTimeInputs(local);

      setTimeout(tick, 100);   // kürzeres Intervall, läuft flüssig auch im Zeitraffer
    }

    function resize() {
      const dpr = window.devicePixelRatio || 1;
      size = Math.min(window.innerWidth, window.innerHeight);
      canvas.width=size*dpr; canvas.height=size*dpr;
      canvas.style.width=size+'px'; canvas.style.height=size+'px';
      ctx.setTransform(dpr,0,0,dpr,0,0);
    }

    window.addEventListener('resize', resize);
    resize();

    // === Start: erst Katalog laden, dann Animation ===
    loadAllData().then(ok => {
      if (ok) {
        loadingEl.style.display = 'none';
        canvas.style.display    = 'block';
        tick();
      } else {
        loadingEl.innerHTML =
          '⚠️ Sternkatalog konnte nicht geladen werden.<br>' +
          '<small>stars.6.json fehlt oder ist nicht erreichbar — bitte Seite neu laden.</small>';
      }
    });
  </script>
</body>
</html>
